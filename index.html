<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYIKS X MODS - لوحة التحكم الأمني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية الأمان الرئيسية والتأثير المتوهج */
        .security-container {
            background-color: #0b0b0b;
            border: 2px solid #ff0000;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6), inset 0 0 15px rgba(255, 0, 0, 0.2);
            transition: all 0.5s ease;
        }

        .shield-icon {
            font-size: 3rem;
            color: #ff0000;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            animation: pulse 2s infinite;
        }

        h1 {
            color: #ff0000;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        .main-status {
            font-size: 1.2rem;
            color: #ffcc00;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* قائمة خطوات التحقق الأمني */
        .check-list {
            text-align: right;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .check-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 8px;
            border-right: 3px solid #ff0000;
            font-size: 0.95rem;
        }

        .status-icon {
            font-size: 1.1rem;
        }

        /* حاوية عرض المفتاح بعد انتهاء الفحص */
        #key-panel {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 255, 0, 0.05);
            border: 1px dashed #00ff00;
            border-radius: 8px;
        }

        #key-display {
            font-family: monospace;
            font-size: 1.3rem;
            color: #00ff00;
            word-break: break-all;
            margin-top: 10px;
            display: block;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .countdown-text {
            color: #aaaaaa;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        #timer {
            color: #ff0000;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="security-container" id="main-gate-box">
        <div class="shield-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>ZAYIKS X MODS</h1>
        
        <div class="main-status" id="gate-title">جاري فحص الأمان . . .</div>

        <div class="check-list">
            <div class="check-item" id="step-shortlink">
                <span>جاري التحقق من الرابط المختصر . . .</span>
                <span class="status-icon" id="icon-shortlink">⏳</span>
            </div>
            <div class="check-item" id="step-vpn">
                <span>جاري فحص اتصال VPN . . .</span>
                <span class="status-icon" id="icon-vpn">⏳</span>
            </div>
            <div class="check-item" id="step-session">
                <span>جاري تشفير الجلسة . . .</span>
                <span class="status-icon" id="icon-session">⏳</span>
            </div>
        </div>

        <div id="key-panel">
            <span style="color: #ffffff;">تم توليد مفتاح الوصول الخاص بك بنجاح:</span>
            <code id="key-display">جاري الاتصال بقاعدة البيانات...</code>
        </div>

        <div class="countdown-text" id="countdown-container" style="display:none;">
            سيتم عرض المفتاح وتأكيد الصلاحية خلال: <span id="timer">10</span> ثوانٍ
        </div>
    </div>
