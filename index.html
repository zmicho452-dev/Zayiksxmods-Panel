<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYIKS X MODS - KEY GENERATOR</title>
    <style>
        /* إعدادات الصفحة الأساسية وخلفية الاختراق */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #050505; 
            color: white; 
            font-family: 'Courier New', Courier, monospace; /* خط يشبه شاشات الهاكرز */
            text-align: center; 
            overflow-x: hidden;
        }

        /* خلفية الأرقام المتساقطة (ماتريكس) */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* حاوية المحتوى لرفعه فوق الخلفية */
        .content-wrapper {
            position: relative;
            z-index: 1;
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* نبض أسطوري وفخم لاسم الموقع */
        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px #D50000, 0 0 20px #D50000; transform: scale(1); }
            50% { text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 60px #ff0000; transform: scale(1.05); }
            100% { text-shadow: 0 0 10px #D50000, 0 0 20px #D50000; transform: scale(1); }
        }
        h1 { 
            color: #fff; 
            font-size: 2.8em;
            font-weight: 900;
            letter-spacing: 3px;
            animation: pulse-glow 2s infinite; 
            margin-bottom: 40px;
        }
        
        /* تصميم الصناديق الزجاجي الفخم */
        .box-style {
            background: rgba(15, 15, 15, 0.85); /* خلفية شبه شفافة */
            backdrop-filter: blur(8px); /* تأثير زجاجي */
            border: 1px solid #D50000;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(213, 0, 0, 0.4), inset 0 0 10px rgba(213, 0, 0, 0.2);
            padding: 25px;
        }

        .verification-box {
            width: 90%;
            max-width: 420px;
            margin: 0 auto 20px auto;
            text-align: right;
        }

        .check-item {
            font-size: 17px;
            margin: 15px 0;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(213, 0, 0, 0.2);
            padding-bottom: 8px;
        }
        .check-item:last-child { border-bottom: none; }
        .check-item span.status { font-weight: bold; }
        .check-item.active { color: #fff; }
        .check-item.success { color: #4CAF50; text-shadow: 0 0 8px #4CAF50; }
        
        .countdown-container { font-size: 20px; margin: 20px 0; display: none; }
        #timer { font-size: 45px; color: #ff0000; font-weight: bold; text-shadow: 0 0 15px #ff0000; margin-top: 15px; }

        /* توهج أسطوري لصندوق المفتاح */
        .key-box { 
            display: none; 
            margin-top: 20px;
            animation: neon-pulse 1.5s infinite alternate;
        }
        @keyframes neon-pulse {
            from { box-shadow: 0 0 10px #D50000, inset 0 0 5px #D50000; border-color: #D50000; }
            to { box-shadow: 0 0 30px #ff0000, inset 0 0 15px #ff0000; border-color: #ff3333; }
        }
        #keyDisplay { 
            font-size: 28px; 
            font-weight: bold; 
            color: #FFFFFF; 
            letter-spacing: 4px; 
            text-shadow: 0 0 15px #ff0000, 0 0 25px #ff0000; 
        }
        
        /* زر بألوان متدرجة وتأثير عند اللمس */
        .btn { 
            background: linear-gradient(45deg, #9b0000, #D50000); 
            color: white; 
            padding: 15px 35px; 
            border: 2px solid #ff0000; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 30px; 
            font-size: 18px;
            font-weight: bold; 
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(213, 0, 0, 0.6);
            display: none;
            letter-spacing: 1px;
        }
        .btn:hover { 
            background: linear-gradient(45deg, #D50000, #ff3333); 
            box-shadow: 0 0 25px #ff0000;
            transform: translateY(-2px);
        }
        .btn:active { transform: scale(0.95); }
        .info { color: #ccc; font-size: 15px; margin-top: 15px; display: none; line-height: 1.6; font-weight: bold;}
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>

    <div class="content-wrapper">
        <h1>ZAYIKS X MODS</h1>
        
        <div class="verification-box box-style" id="verificationBox">
            <h3 style="text-align: center; color: #ff3333; margin-top: 0; text-shadow: 0 0 10px #ff0000;">جاري فحص النظام...</h3>
            <div class="check-item" id="check1">تخطي رابط الاختصار <span class="status">⏳</span></div>
            <div class="check-item" id="check2">فحص استخدام VPN <span class="status">⏳</span></div>
            <div class="check-item" id="check3">سلامة وتشفير الجلسة <span class="status">⏳</span></div>
        </div>

        <div class="countdown-container" id="countdownBox">
            <p>جاري تجهيز مفتاحك الخاص، يرجى الانتظار...</p>
            <div id="timer">10</div>
        </div>
        
        <div class="key-box box-style" id="keyContainer">
            <span id="keyDisplay">جاري التوليد...</span>
        </div>
        
        <button class="btn" id="copyBtn" onclick="copyKey()">نسخ المفتاح</button>
        <p class="info" id="infoText">المفتاح يعمل على جهاز واحد فقط، لا تشاركه مع أحد.<br>صالح لمدة 24 ساعة فقط من وقت التفعيل.</p>
    </div>

    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({length: columns}).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#D50000';
            ctx.font = fontSize + 'px Courier New';
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
