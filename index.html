<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYIKS X MODS - KEY SYSTEM</title>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #030303; color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        .container { text-align: center; z-index: 1; background: rgba(10, 10, 10, 0.85); padding: 30px; border-radius: 15px; border: 2px solid #ff0000; box-shadow: 0 0 20px #ff0000; width: 90%; max-width: 400px; backdrop-filter: blur(5px); }
        h1 { color: #ff0000; text-shadow: 0 0 10px #ff0000; font-size: 24px; margin-bottom: 5px; }
        .box { display: none; margin-top: 20px; }
        .check-item { margin: 10px 0; font-size: 14px; text-align: right; color: #555; transition: 0.3s; }
        .check-item.success { color: #00ff66; text-shadow: 0 0 5px #00ff66; }
        .timer { font-size: 45px; color: #ff0000; font-weight: bold; margin: 15px 0; text-shadow: 0 0 15px #ff0000; }
        .key-display { font-size: 20px; color: #00ff66; background: #111; padding: 15px; border: 1px dashed #00ff66; border-radius: 8px; margin: 15px 0; letter-spacing: 2px; word-wrap: break-word; }
        button { background: linear-gradient(45deg, #660000, #ff0000); color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold; width: 100%; transition: 0.3s; box-shadow: 0 0 10px #ff0000; }
        button:hover { background: #ff0000; box-shadow: 0 0 20px #ff0000; transform: scale(1.05); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1️⃣ التحقق من توكن الأمان القادم من صفحة الاختصار (Gate)
        const token = sessionStorage.getItem('zayiks_secure_token');
        let accessGranted = false;

        if (token) {
            try {
                const decrypted = atob(token);
                const originalTime = parseInt(decrypted.split('_')[0]);
                // يجب أن لا يمر أكثر من 15 ثانية (15000 ملي ثانية) على توليد التوكن
                if (Date.now() - originalTime < 15000) {
                    accessGranted = true;
                }
            } catch (e) {
                accessGranted = false;
            }
        }

        // حذف التوكن فوراً لمنع إعادة استخدامه عند التحديث
        sessionStorage.removeItem('zayiks_secure_token');

        // إذا فشل التحقق، يتم طرد المستخدم فوراً إلى رابط اختصار الروابط للحصول على مفتاح جديد
        if (!accessGranted) {
            window.location.replace('https://short-jambo.ink/ZAYIKS_X_MODS_GET_KEY_24H');
        }
    </script>
</head>
<body>
    
    <canvas id="matrix-bg"></canvas>

    <div class="container" id="mainContainer">
        <h1>🛡️ ZAYIKS X MODS 🛡️</h1>
        
        <div id="verificationBox" style="display: block;">
            <h3 style="color: #ffaa00;">جاري فحص الأمان...</h3>
            <div id="check1" class="check-item"><span class="status">⏳ جاري التحقق من الرابط المختصر...</span></div>
            <div id="check2" class="check-item"><span class="status">⏳ جاري فحص اتصال VPN...</span></div>
            <div id="check3" class="check-item"><span class="status">⏳ جاري تشفير الجلسة...</span></div>
        </div>

        <div id="countdownBox" class="box">
            <h3 style="color: white;">سيتم إصدار المفتاح خلال</h3>
            <div class="timer" id="timer">10</div>
            <p style="color: #aaa; font-size: 12px;">يرجى عدم إغلاق الصفحة للحفاظ على الاتصال</p>
        </div>

        <div id="keyContainer" class="box">
            <h3 style="color: #00ff66;">تم إنشاء المفتاح بنجاح!</h3>
            <div class="key-display" id="keyDisplay">جاري الإنشاء...</div>
            <button id="copyBtn" onclick="copyKey()">نسخ المفتاح البيوميتري</button>
            <p id="infoText" style="color: #aaa; font-size: 12px; margin-top: 15px; display: none;">هذا المفتاح مخصص لجهازك وصالح لمدة 24 ساعة فقط.</p>
        </div>
    </div>

    <script>
        if (localStorage.getItem('zayiks_key_generated_today')) {
            document.getElementById('mainContainer').innerHTML = "<h2 style='color:red;'>🚫 تم إيقاف العملية!</h2><p style='color:white; font-size:16px;'>لقد قمت بتوليد مفتاحك بالفعل.</p><p style='color:#aaa; font-size:12px;'>موقع اختصار الروابط يتذكر جهازك لمدة 24 ساعة، لا تحاول التحايل لتوليد مفاتيح عشوائية.</p>";
            const vBox = document.getElementById('verificationBox');
            if(vBox) vBox.remove();
        } else {
            setInterval(() => {
                const keyDisplay = document.getElementById('keyDisplay');
                if (keyDisplay && keyDisplay.innerText.includes('ZAYIKS-')) {
                    localStorage.setItem('zayiks_key_generated_today', 'true');
                }
            }, 1000);
        }
    </script>

    <script>
        // إعداد وتأثير الماتريكس الخلفية
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789🧬☠️⚠️🛑';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(3, 3, 3, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // إعدادات الفايربيس (تجميع السلاسل النصية المفككة)
        const firebaseConfig = {
            apiKey: "AIzaSyCJs56D8IzwVaHNBtM5h1ViCMyRUM15MFU",
            authDomain: "zayiksxxit.firebaseapp.com",
            databaseURL: "https://zayiksxxit-default-rtdb.firebaseio.com",
            projectId: "zayiksxxit",
            storageBucket: "zayiksxxit.appspot.com",
            messagingSenderId: "6437733976316",
            appId: "1:6437733976316:web:9789f3f5066e298c0b1179"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        window.onload = function() {
            runRealChecks();
        };

        // دالة الفحوصات الأمنية والـ VPN
        async function runRealChecks() {
            // محاكاة انتظار الفحص الأول
            await new Promise(resolve => setTimeout(resolve, 1200));
            setSuccess('check1', '✔️ تم التحقق من الرابط المختصر');

            try {
                // جلب بيانات الشبكة لفحص الـ VPN ومزود الاستضافة
                let response = await fetch('https://ipapi.co/json/');
                let data = await response.json();
                
                if (data.security || data.org.toLowerCase().includes('vpn') || data.org.toLowerCase().includes('hosting')) {
                    document.getElementById('verificationBox').innerHTML = "<h3 style='color:red;'>🚫 عذراً، تم رصد اتصال VPN نشط! قم بإغلاقه لإنشاء المفتاح.</h3>";
                    return;
                }
                setSuccess('check2', '✔️ اتصال آمن وموثوق (لا يوجد VPN)');
            } catch (error) {
                // في حال فشل اتصال سكريبت الفحص الخارجي، يتخطى محلياً لتفادي قفل الموقع
                setSuccess('check2', '✔️ تم التحقق من سلامة الشبكة Local');
            }

            await new Promise(resolve => setTimeout(resolve, 1000));
            setSuccess('check3', '✔️ جلسة مشفرة بنجاح SSL/TLS');

            await new Promise(resolve => setTimeout(resolve, 800));
            
            // إخفاء صندوق الفحص وإظهار العداد التنازلي
            document.getElementById('verificationBox').style.display = 'none';
            document.getElementById('countdownBox').style.display = 'block';
            startCountdown();
        }

        function setSuccess(id, text) {
            const el = document.getElementById(id);
            el.classList.add('success');
            el.querySelector('.status').innerText = text;
        }

        function startCountdown() {
            let count = 10;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                count--;
                timerEl.innerText = count;
                if (count <= 0) {
                    clearInterval(interval);
                    generateAndSaveKey();
                }
            }, 1000);
        }

        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // توليد المفتاح وحفظه مباشرة في الـ Firebase
        function generateAndSaveKey() {
            document.getElementById('countdownBox').style.display = 'none';
            
            // هيكلة المفتاح: ZAYIKS-XXXX-XXXX-24H
            const generatedKey = 'ZAYIKS-' + generateRandomString(4) + '-' + generateRandomString(4) + '-24H';
            const timestamp = Date.now();

            // رفع البيانات إلى قاعدة البيانات الفايربيس
            database.ref('ActiveKeys/' + generatedKey).set({
                createdAt: timestamp,
                status: 'active',
                deviceID: 'none',
                secretKey: 'ZAYIKS_X_MODS_0658946573'
            }).then(() => {
                document.getElementById('keyContainer').style.display = 'inline-block';
                document.getElementById('keyDisplay').innerText = generatedKey;
                document.getElementById('copyBtn').style.display = 'inline-block';
                document.getElementById('infoText').style.display = 'block';
            }).catch(error => {
                // ملاحظة هامة جداً: إذا ظهرت هذه الرسالة فالمشكلة مئة بالمئة في الـ Firebase Rules
                document.getElementById('keyContainer').style.display = 'inline-block';
                document.getElementById('keyDisplay').innerText = 'فشل في الاتصال بالسيرفر!';
                console.error("Firebase Error:", error);
            });
        }

        // دالة نسخ المفتاح
        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            navigator.clipboard.writeText(keyText);
            
            const btn = document.getElementById('copyBtn');
            btn.innerText = '✔️ تم النسخ بنجاح الأسطوري';
            btn.style.backgroundColor = '#00ff66';
            
            setTimeout(() => {
                btn.innerText = 'نسخ المفتاح البيوميتري';
                btn.style.background = 'linear-gradient(45deg, #660000, #ff0000)';
            }, 2000);
        }
    </script>
</body>
</html>
