<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZAYIKS X MODS - SECURITY VERIFICATION</title>
    <style>
        body { background-color: #0D0D0D; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1C1C1C; padding: 20px; border-radius: 15px; border: 1px solid #D50000; display: inline-block; width: 300px; }
        .check-item { text-align: right; margin: 10px 0; color: #aaa; }
        .check-item.done { color: #00ff00; }
        #timer { font-size: 30px; color: #D50000; font-weight: bold; margin: 20px 0; }
        .btn { background-color: #D50000; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ZAYIKS X MODS</h1>
    
    <div id="main-ui" class="box">
        <div id="checks">
            <div class="check-item" id="c1">✅ التحقق من الرابط (تم)</div>
            <div class="check-item" id="c2">⏳ فحص الاتصال الآمن...</div>
            <div class="check-item" id="c3">⏳ التحقق من عدم التلاعب...</div>
        </div>
        <div id="timer">10</div>
        <div id="keyDisplay" style="font-size: 20px; margin: 10px 0;">جاري التحقق...</div>
        <button class="btn" onclick="copyKey()" id="copyBtn" disabled>نسخ المفتاح</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. نظام الحماية
        if (sessionStorage.getItem("verified_user") !== "YES_PASSED_SHORT") {
            window.location.replace("https://short-jambo.ink/ZAYIKS_X_MODS_GET_KEY_24H");
        }

        // منع التكرار: إذا كان قد ولد مفتاحاً بالفعل
        if (sessionStorage.getItem("key_generated")) {
             document.getElementById('keyDisplay').innerText = "لقد حصلت على مفتاحك بالفعل!";
             document.getElementById('timer').style.display = "none";
        } else {
            startVerification();
        }

        function startVerification() {
            // تحديث الواجهة
            setTimeout(() => document.getElementById('c2').innerHTML = "✅ فحص الاتصال الآمن (سليم)", 2000);
            setTimeout(() => document.getElementById('c3').innerHTML = "✅ التحقق من عدم التلاعب (سليم)", 4000);

            let timeLeft = 10;
            let timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    generateKey();
                }
            }, 1000);
        }

        function generateKey() {
            const firebaseConfig = {
              apiKey: "AIzaSyCJs56D8IzwVaHNBtM5h1ViCMyRUM15MFU",
              authDomain: "zayiksxxit.firebaseapp.com",
              databaseURL: "https://zayiksxxit-default-rtdb.firebaseio.com",
              projectId: "zayiksxxit",
              storageBucket: "zayiksxxit.firebasestorage.app",
              messagingSenderId: "643773976316",
              appId: "1:643773976316:web:9789f3f5066e298c0b1179"
            };
            if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            
            const newKey = "ZAYIKS-" + Math.floor(Math.random()*9000+1000) + "-" + Math.floor(Math.random()*9000+1000) + "-24H";
            
            database.ref('ActiveKeys/' + newKey).set({
                createdAt: Date.now(),
                status: "active",
                deviceID: "none",
                secretKey: "ZAYIKS_X_MODS_0658946573"
            }).then(() => {
                document.getElementById('keyDisplay').innerText = newKey;
                document.getElementById('timer').innerText = "تم التوليد بنجاح!";
                document.getElementById('copyBtn').disabled = false;
                sessionStorage.setItem("key_generated", "true"); // علامة لمنع التكرار
            });
        }

        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('keyDisplay').innerText);
            alert("تم النسخ!");
        }
    </script>
</body>
</html>
