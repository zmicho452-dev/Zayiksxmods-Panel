<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYIKS X MODS - KEY GENERATOR</title>
    <style>
        body { 
            background-color: #0D0D0D; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 50px; 
        }
        h1 { color: #D50000; text-shadow: 0 0 10px #D50000; font-weight: bold; }
        
        .verification-box {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            padding: 15px;
            text-align: right;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .check-item {
            font-size: 16px;
            margin: 12px 0;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .check-item span.status { font-weight: bold; }
        .check-item.active { color: #fff; }
        .check-item.success { color: #4CAF50; }
        
        .countdown-container { font-size: 20px; margin: 20px 0; display: none; }
        #timer { font-size: 35px; color: #D50000; font-weight: bold; }

        .key-box { 
            background-color: #1C1C1C; 
            padding: 20px; 
            border-radius: 10px; 
            border: 2px solid #D50000; 
            display: inline-block; 
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(213, 0, 0, 0.5);
            display: none;
        }
        #keyDisplay { font-size: 24px; font-weight: bold; color: #FFFFFF; letter-spacing: 2px; }
        
        .btn { 
            background-color: #D50000; 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 30px; 
            font-size: 16px;
            font-weight: bold; 
            transition: 0.3s;
            display: none;
        }
        .btn:active { transform: scale(0.95); background-color: #9b0000; }
        .info { color: #888; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <h1>ZAYIKS X MODS</h1>
    
    <div class="verification-box" id="verificationBox">
        <h3 style="text-align: center; color: #D50000; margin-top: 0;">جاري فحص النظام...</h3>
        <div class="check-item" id="check1">تخطي رابط الاختصار <span class="status">⏳</span></div>
        <div class="check-item" id="check2">فحص استخدام VPN <span class="status">⏳</span></div>
        <div class="check-item" id="check3">سلامة وتشفير الجلسة <span class="status">⏳</span></div>
    </div>

    <div class="countdown-container" id="countdownBox">
        <p>جاري تجهيز مفتاحك الخاص، يرجى الانتظار...</p>
        <div id="timer">10</div>
    </div>
    
    <div class="key-box" id="keyContainer">
        <span id="keyDisplay">جاري التوليد...</span>
    </div>
    <br>
    <button class="btn" id="copyBtn" onclick="copyKey()">نسخ المفتاح</button>
    <p class="info" id="infoText">المفتاح يعمل على جهاز واحد فقط، لا تشاركه مع أحد.<br>صالح لمدة 24 ساعة فقط من وقت التفعيل.</p>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. نظام التحقق
        const isVerified = sessionStorage.getItem("verified_user");
        if (isVerified !== "YES_PASSED_SHORT") {
            window.location.replace("https://short-jambo.ink/ZAYIKS_X_MODS_GET_KEY_24H");
        }

        const firebaseConfig = {
          apiKey: "AIzaSyCJs56D8IzwVaHNBtM5h1ViCMyRUM15MFU",
          authDomain: "zayiksxxit.firebaseapp.com",
          databaseURL: "https://zayiksxxit-default-rtdb.firebaseio.com",
          projectId: "zayiksxxit",
          storageBucket: "zayiksxxit.firebasestorage.app",
          messagingSenderId: "643773976316",
          appId: "1:643773976316:web:9789f3f5066e298c0b1179"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        setTimeout(() => {
            document.getElementById('check1').classList.add('success');
            document.getElementById('check1').querySelector('.status').innerText = '✔️ صحيح';
        }, 1500);

        setTimeout(() => {
            document.getElementById('check2').classList.add('success');
            document.getElementById('check2').querySelector('.status').innerText = '✔️ سليم';
        }, 3000);

        setTimeout(() => {
            document.getElementById('check3').classList.add('success');
            document.getElementById('check3').querySelector('.status').innerText = '✔️ موثوق';
            setTimeout(startCountdown, 1000);
        }, 4500);

        function startCountdown() {
            document.getElementById('verificationBox').style.display = 'none';
            document.getElementById('countdownBox').style.display = 'block';
            
            let timeLeft = 10;
            let timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    generateAndSaveKey(); 
                }
            }, 1000);
        }

        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function generateAndSaveKey() {
            document.getElementById('countdownBox').style.display = 'none';
            const newKey = "ZAYIKS-" + generateRandomString(4) + "-" + generateRandomString(4) + "-24H";
            const timestamp = Date.now();

            database.ref('ActiveKeys/' + newKey).set({
                createdAt: timestamp,
                status: "active",
                deviceID: "none",
                secretKey: "ZAYIKS_X_MODS_0658946573"
            }).then(() => {
                document.getElementById('keyContainer').style.display = 'inline-block';
                document.getElementById('copyBtn').style.display = 'inline-block';
                document.getElementById('infoText').style.display = 'block';
                document.getElementById('keyDisplay').innerText = newKey;
                sessionStorage.removeItem("verified_user");
            }).catch((error) => {
                document.getElementById('keyContainer').style.display = 'inline-block';
                document.getElementById('keyDisplay').innerText = "حدث خطأ في الاتصال!";
            });
        }

        // تم تحسين زر النسخ هنا
        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            if(keyText !== "جاري التوليد..." && keyText !== "حدث خطأ في الاتصال!") {
                navigator.clipboard.writeText(keyText);
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✔️ تم النسخ بنجاح";
                btn.style.backgroundColor = "#4CAF50"; 
                setTimeout(() => {
                    btn.innerText = "نسخ المفتاح";
                    btn.style.backgroundColor = "#D50000"; 
                }, 2000);
            }
        }
    </script>
</body>
</html>
