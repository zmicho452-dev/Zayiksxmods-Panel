    <script>
        // --- القسم الأول: أكواد الأنيميشن والحماية البسيطة (مكشوفة لكي لا يعلق الموقع) ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if(e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'S'.charCodeAt(0))) return false;
        };

        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = 'ZAYIKSXMODS0123456789☠️⚠️⚡☢️';
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = Array.from({length: columns}).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold ' + fontSize + 'px Orbitron';
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        function moveSocials() {
            const balls = document.querySelectorAll('.social-ball');
            balls.forEach(ball => {
                if (!ball.vx) {
                    ball.vx = (Math.random() * 1.5 + 0.5) * (Math.random() > 0.5 ? 1 : -1);
                    ball.vy = (Math.random() * 1.5 + 0.5) * (Math.random() > 0.5 ? 1 : -1);
                    ball.x = Math.random() * (window.innerWidth - 70);
                    ball.y = Math.random() * (window.innerHeight - 70);
                }
                ball.x += ball.vx; ball.y += ball.vy;
                if (ball.x <= 0 || ball.x >= window.innerWidth - 70) ball.vx *= -1;
                if (ball.y <= 0 || ball.y >= window.innerHeight - 70) ball.vy *= -1;
                ball.style.left = ball.x + 'px'; ball.style.top = ball.y + 'px';
            });
            requestAnimationFrame(moveSocials);
        }
        moveSocials();
