<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { 
            background-color: #0D0D0D; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 80px; 
        }
        h1 { color: #D50000; text-shadow: 0 0 10px #D50000; font-weight: bold; }
        .key-box { 
            background-color: #1C1C1C; 
            padding: 20px; 
            border-radius: 10px; 
            border: 2px solid #D50000; 
            display: inline-block; 
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(213, 0, 0, 0.5);
        }
        #keyDisplay { 
            font-size: 24px; 
            font-weight: bold; 
            color: #FFFFFF; 
            letter-spacing: 2px; 
        }
        .btn { 
            background-color: #D50000; 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 30px; 
            font-size: 16px;
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); background-color: #9b0000; }
        .info { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>ZAYIKS X MODS</h1>
    <p>تم توليد مفتاحك بنجاح! صالح لمدة 24 ساعة فقط.</p>
    
    <div class="key-box">
        <span id="keyDisplay">جاري التوليد...</span>
    </div>
    <br>
    <button class="btn" onclick="copyKey()">نسخ المفتاح</button>
    <p class="info">المفتاح يعمل على جهاز واحد فقط، لا تشاركه مع أحد.</p>

    <!-- مكاتب Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        
    // قفل
        const isVerified = localStorage.getItem("verified_user");
        if (isVerified !== "YES_PASSED_SHORT") {
            // قفل
            window.location.replace("https://short-jambo.ink/ZAYIKS_X_MODS_GET_KEY_24H");
        }

        // إعدادات فايربيس الخاصة بك
        const firebaseConfig = {
          apiKey: "AIzaSyCJs56D8IzwVaHNBtM5h1ViCMyRUM15MFU",
          authDomain: "zayiksxxit.firebaseapp.com",
          databaseURL: "https://zayiksxxit-default-rtdb.firebaseio.com",
          projectId: "zayiksxxit",
          storageBucket: "zayiksxxit.firebasestorage.app",
          messagingSenderId: "643773976316",
          appId: "1:643773976316:web:9789f3f5066e298c0b1179"
        };

        // تهيئة فايربيس
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // دالة توليد حروف وأرقام عشوائية
        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // إنشاء المفتاح
        const newKey = "ZAYIKS-" + generateRandomString(4) + "-" + generateRandomString(4) + "-24H";
        const timestamp = Date.now(); 

        // إرسال المفتاح لفايربيس
                // إرسال المفتاح لفايربيس
        database.ref('ActiveKeys/' + newKey).set({
            createdAt: timestamp,
            status: "active",
            deviceID: "none",
            secretKey: "ZAYIKS_X_MODS_0658946573"
        }).then(() => {
            document.getElementById('keyDisplay').innerText = newKey;
        }).catch((error) => {
            document.getElementById('keyDisplay').innerText = "حدث خطأ في الاتصال!";
            console.error("خطأ:", error);
        });


        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            if(keyText !== "جاري التوليد..." && keyText !== "حدث خطأ في الاتصال!") {
                navigator.clipboard.writeText(keyText);
                alert("تم النسخ بنجاح: " + keyText + "\n\nاذهب الآن إلى البانل لتسجيل الدخول.");
            }
        }
    </script>
