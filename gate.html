    <title>ZAYIKS X MODS - Verifying...</title>
</head>
<body style="background-color: #050505;">
    <script>
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }
        
        let ref = document.referrer;
        
        if (!ref || ref.includes("zmicho452-dev.github.io")) {
            window.location.replace("index.html");
        } else {
            const now = Date.now().toString();
            const secureToken = btoa(now + "_ZAYIKS_ULTRA_PASS");
            sessionStorage.setItem("zayiks_secure_session", secureToken);
            window.location.replace("index.html?verify_token=" + secureToken);
        }
    </script>
</body>
</html>
