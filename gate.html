<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZAYIKS X MODS - Verifying...</title>
</head>
<body style="background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <script>
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const access = urlParams.get('access');

        if (access === 'true') {
            const now = Date.now().toString();
            const secureToken = btoa(now + "_ZAYIKS_ULTRA_PASS");
            sessionStorage.setItem("zayiks_secure_session", secureToken);
            window.location.replace("index.html?verify_token=" + secureToken);
        } else {
            window.location.replace("https://short-jambo.ink/ZAYIKS_X_MODS_GET_KEY_24H");
        }
    </script>
</body>
</html>
